<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Bento — offline</title>
<style>
  :root {
    color-scheme: light dark;
    --canvas: #f5f6f8;
    --surface: #ffffff;
    --ink: #1a1d23;
    --muted: #5f6b7a;
    --line: #e4e7ec;
    --accent: #3b6cf6;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --canvas: #101317;
      --surface: #1a1d23;
      --ink: #f2f4f7;
      --muted: #93a0b2;
      --line: #2b2f37;
      --accent: #6d93f9;
    }
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    padding: 0;
    height: 100%;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
    padding: 32px 24px;
    padding-top: max(32px, env(safe-area-inset-top));
    padding-bottom: max(32px, env(safe-area-inset-bottom));
    background: var(--canvas);
    color: var(--ink);
    font-family: "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .card {
    width: 100%;
    max-width: 360px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 40px 28px;
    text-align: center;
    box-shadow: 0 1px 2px rgba(16, 24, 40, 0.06), 0 8px 24px rgba(16, 24, 40, 0.08);
  }

  .glyph {
    width: 56px;
    height: 56px;
    margin: 0 auto 20px;
    color: var(--muted);
  }

  h1 {
    margin: 0 0 8px;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  p {
    margin: 0 0 24px;
    font-size: 14px;
    line-height: 1.5;
    color: var(--muted);
  }

  button {
    appearance: none;
    border: none;
    width: 100%;
    padding: 12px 24px;
    border-radius: 14px;
    background: var(--accent);
    color: #ffffff;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.25), 0 1px 1px rgba(16, 24, 40, 0.08);
    transition: filter 0.15s ease, transform 0.05s ease;
  }

  button:hover {
    filter: brightness(1.06);
  }

  button:active {
    transform: translateY(1px);
    filter: brightness(0.97);
  }

  button:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  button:disabled {
    background: var(--muted);
    cursor: not-allowed;
    box-shadow: none;
  }
</style>
</head>
<body>
  <div class="card">
    <svg class="glyph" viewBox="0 0 600 600" width="56" height="56" aria-hidden="true">
      <rect width="600" height="600" rx="96" fill="currentColor" />
      <rect x="78" y="78" width="150" height="444" rx="50" fill="var(--surface)" />
      <rect x="314" y="78" width="208" height="179" rx="50" fill="var(--surface)" />
      <rect x="314" y="343" width="208" height="179" rx="50" fill="var(--surface)" />
    </svg>
    <h1>You're offline</h1>
    <p>Bento needs a connection to reach the Spark server.</p>
    <button type="button" onclick="location.replace('/')">Retry</button>
  </div>
</body>
</html>
