# .github/workflows/desktop-build.yml
name: desktop-build
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - shell: bash
        run: npm -w @event-editor/desktop run dist || npm -w @event-editor/desktop run dist
        env:
          # unsigned builds (personal use) - skip electron-builder code signing
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          # preset keys baked into Resources/preset.env for the settings setup
          # code (assemble-server.mjs reads these when there is no repo .env)
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          # extra setup codes, comma-separated, each optionally scoped to key
          # groups (e.g. "sparkbento:groq|claude"). Kept in a secret because the
          # repo is public and a code hands out the baked keys.
          EE_UNLOCK_CODES: ${{ secrets.EE_UNLOCK_CODES }}
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/desktop/dist/*.dmg
            packages/desktop/dist/*.zip
            packages/desktop/dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
