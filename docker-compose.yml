services:
  bento:
    build: .
    restart: unless-stopped
    env_file: .env.server
    volumes:
      - bento-data:/data
    ports:
      - "127.0.0.1:3000:3000"
  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    env_file: .env.server
    depends_on:
      - bento
volumes:
  bento-data: {}
